<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biodata</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

table{
    width: 400px;
    margin: 50px auto;
    border-collapse: collapse;
    background-color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

th{
    color: black;
    padding: 15px;
    font-size: 22px;
}

td{
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.label{
    font-weight: bold;
    width: 120px;
}

.foto{
    text-align: center;
    padding-top: 20px;
}

.foto img{
    width: 120px;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}
</style>
</head>
<body>

<table>
<tr>
<td colspan="2" class="foto">
<img src="dika.jpg" alt="Foto Dika">
</td>
</tr>

<tr>
<th colspan="2">BIODATA</th>
</tr>

<tr>
<td class="label">Nama</td>
<td>fuerta dika romano</td>
</tr>

<tr>
<td class="label">Kelas</td>
<td>XI</td>
</tr>

<tr>
<td class="label">Umur</td>
<td>17 Tahun</td>
</tr>

<tr>
<td class="label">Hobi</td>
<td>biliard</td>
</tr>

</table>
</body>
</html>
